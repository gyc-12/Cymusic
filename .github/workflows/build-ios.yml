name: Build iOS IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: yarn install

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Apply patches
        run: npx patch-package

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned .app
        run: |
          xcodebuild -workspace ios/CyMusic.xcworkspace \
            -scheme CyMusic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/CyMusic.app Payload/
          zip -r CyMusic-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CyMusic-unsigned-ipa
          path: CyMusic-unsigned.ipa
